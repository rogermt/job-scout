repos:
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        exclude: '^Scrapling/'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: '^Scrapling/'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '^Scrapling/'
      - id: end-of-file-fixer
        exclude: '^Scrapling/'
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, sqlalchemy, beautifulsoup4, requests, python-dateutil, pydantic-settings, email-validator]
        args: [--config-file, mypy.ini]
        stages: [manual]

  - repo: local
    hooks:
      - id: uv-lock
        name: Update uv lockfile
        entry: uv pip compile requirements.in -o requirements.txt
        language: system
        pass_filenames: false
