# Job Scout Configuration
# This is your master configuration file

personal:
  name: "Your Name"
  email: "your.email@example.com"
  phone: "+44 7700 900000"
  location: "London, UK"
  right_to_work: "UK Citizen"
  linkedin_profile: "https://linkedin.com/in/yourprofile"

job_preferences:
  titles:
    - "Software Engineer"
    - "Senior Software Engineer"
    - "Python Developer"
  keywords:
    - "python"
    - "aws"
    - "django"
    - "flask"
  experience_level: "mid"
  remote_only: true
  locations:
    - "UK Remote"
    - "Europe Remote"
    - "Worldwide Remote"
  exclude_keywords:
    - "recruiter"
    - "commission"
    - "sales"
  company_size:
    - "10-50"
    - "50-200"
    - "200+"
  contract_types:
    - "permanent"
    - "contract"
  salary:
    min_gbp: 40000

ai:
  provider: "openai"
  api_key: "sk-your-api-key-here"
  model: "gpt-4"
  cv_tailoring: true
  cover_letter_generation: true

database:
  path: "output/job_scout.db"
  echo: false

output:
  applications_dir: "output/applications"
  tailored_cv_dir: "output/tailored_cvs"
  cover_letter_dir: "output/cover_letters"
  analytics_dir: "output/analytics"
  log_file: "logs/job_scout.log"

scheduling:
  search_frequency_hours: 6
  enabled: false

# Platform configurations
platforms:
  indeed:
    enabled: true
    region: "uk"
  remoteok:
    enabled: true
  weworkremotely:
    enabled: true