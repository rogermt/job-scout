[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "job-scout"
version = "0.1.0"
description = "Autonomous job hunting tool for UK and worldwide remote positions"
authors = [{name = "Job Scout", email = "jobscout@example.com"}]
readme = "README.md"
requires-python = ">=3.11,<4.0"
license = {text = "MIT"}
keywords = ["job-search", "automation", "career", "cv", "resume"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    # Configuration & Settings
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "pyyaml>=6.0",
    
    # Web Scraping
    "requests>=2.31.0",
    "httpx>=0.24.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=4.9.0",
    
    # AI/ML APIs
    "openai>=1.0.0",
    "anthropic>=0.7.0",
    
    # Database & ORM
    "sqlalchemy>=2.0.0",
    "alembic>=1.10.0",
    
    # Document Generation
    "reportlab>=4.0.0",
    "python-docx>=0.8.11",
    "jinja2>=3.1.0",
    
    # Resilience & Error Handling
    "tenacity>=8.2.0",
    
    # Scheduling
    "apscheduler>=3.10.0",
    
    # Utilities
    "python-dateutil>=2.8.0",
    "click>=8.1.0",
    "rich>=13.0.0",
    
    # Data Processing
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    
    # Types & Validation
    "typing-extensions>=4.5.0",
    "email-validator>=2.0.0",
]

[project.optional-dependencies]
dev = [
    # Formatting
    "black>=23.0.0",
    "isort>=5.12.0",
    
    # Linting
    "ruff>=0.1.0",
    
    # Type Checking
    "mypy>=1.5.0",
    "types-setuptools",
    "types-requests",
    "types-pyyaml",
    "types-python-dateutil",
    
    # Testing
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.11.0",
    
    # Documentation
    "sphinx>=7.0.0",
    "sphinx-rtd-theme>=1.3.0",
]

[project.urls]
Homepage = "https://github.com/job-scout/job-scout"
Repository = "https://github.com/job-scout/job-scout"
Issues = "https://github.com/job-scout/job-scout/issues"

[project.scripts]
job-scout = "job_scout.main:cli"

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.ruff]
target-version = "py311"
line-length = 100
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501",  # line too long, handled by black
    "F401",  # unused imports handled by pyflakes
]

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 100
known_first_party = ["job_scout"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "reportlab.*",
    "_pytest.*",
    "pytest.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-fail-under=80",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow tests",
]

[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__main__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]

[tool.coverage.html]
directory = "htmlcov"
