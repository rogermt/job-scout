[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "jobscout"
version = "0.1.0"
description = "Autonomous job hunting tool for UK and worldwide remote positions"
authors = [{name = "Job Scout", email = "jobscout@example.com"}]
readme = "README.md"
requires-python = ">=3.11,<4.0"
license = {text = "MIT"}

[project.optional-dependencies]
test = ["pytest>=7.0.0", "pytest-cov>=4.0.0"]
lint = ["ruff>=0.1.0", "black>=23.0.0", "mypy>=1.0.0"]

[tool.setuptools]
[tool.setuptools.packages.find]
where = ["src"]
